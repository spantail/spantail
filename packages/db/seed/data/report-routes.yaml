# Cross-workspace daily reports. A member who works across several workspaces
# files one combined daily report spanning them, instead of separate
# per-workspace reports for those workspaces. Because the rendered document
# mixes those workspaces' spans, it may be delivered only to people who are
# members of *every* listed workspace — recipients are derived from membership
# (mirroring the app's "Send to" picker) and never widened, so a recipient never
# sees a workspace they don't belong to.
#
# Bilal and Erin are both shared across the two English clients, so each rolls up
# their Acme + Globex day into one report. Given the membership graph it reaches
# the other members of both workspaces:
#   - Bilal's Acme + Globex → Carol, Erin
#   - Erin's  Acme + Globex → Bilal, Carol
# The first workspace is the anchor (its timezone and language drive the report).
- sender: u-author
  workspaces: [ws-acme, ws-globex]
- sender: u-erin
  workspaces: [ws-acme, ws-globex]
