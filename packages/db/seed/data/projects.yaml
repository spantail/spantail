# Three active projects per workspace. Names and `activities` follow the
# workspace language. `activities` are concrete task phrases the work-entry
# generator draws from (rotated deterministically per user/day), so the demo
# reads like real work instead of "Implemented features for X" on repeat.
- key: p-self-platform
  workspace: ws-self
  slug: platform
  name: Platform Core
  hue: 240
  description: Core services and APIs.
  activities:
    - Implemented the workspace invitation flow
    - Added cursor pagination to the entries API
    - Hardened report-scope permission checks
    - Reviewed the D1 query-layer refactor
    - Fixed a timezone bug in daily rollups
- key: p-self-tooling
  workspace: ws-self
  slug: tooling
  name: Internal Tools
  hue: 160
  description: Internal developer tooling.
  activities:
