# How each member fills a working day. Every weekday a member logs exactly
# 480 minutes (8h), split across the listed projects. Descriptions and tags are
# picked deterministically from the pools below (rotated by day), keeping reruns
# reproducible. Each project's language decides the description language.
allocations:
  u-admin:
    - { project: p-self-platform, minutes: 240 }
    - { project: p-sakura-inventory, minutes: 240 }
  u-author:
    - { project: p-self-tooling, minutes: 180 }
    - { project: p-acme-warehouse, minutes: 300 }
  u-carol:
    - { project: p-self-platform, minutes: 120 }
    - { project: p-acme-mobile, minutes: 180 }
    - { project: p-globex-portal, minutes: 180 }
  u-dan:
    - { project: p-acme-data, minutes: 180 }
    - { project: p-globex-cms, minutes: 120 }
    - { project: p-sakura-orders, minutes: 180 }
  u-erin:
    - { project: p-globex-analytics, minutes: 240 }
    - { project: p-sakura-dashboard, minutes: 240 }

# Sentence templates; `{project}` is replaced with the project name.
descriptions:
  en:
    - Implemented features for {project}
    - Reviewed pull requests on {project}
    - Fixed bugs in {project}
    - Wrote tests for {project}
    - Refactored modules in {project}
    - Updated documentation for {project}
  ja:
    - "{project} の機能を実装"
    - "{project} のプルリクをレビュー"
    - "{project} の不具合を修正"
    - "{project} のテストを追加"
    - "{project} のモジュールをリファクタ"
    - "{project} のドキュメントを更新"

tags:
  en: [feature, review, bugfix, test, refactor, docs]
  ja: [feature, review, bugfix, test, refactor, docs]
