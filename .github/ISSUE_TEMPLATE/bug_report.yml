name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: >-
        For questions or help, please use
        [Q&A Discussions](https://github.com/spantail/spantail/discussions/categories/q-a)
        instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and the actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: >-
        How are you running Spantail (self-hosted vs hosted), version / commit, browser
        or CLI version if relevant.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant logs, error output, or screenshots. Do not include secrets.
    validations:
      required: false
