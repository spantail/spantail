# Deploys the documentation site (apps/docs) to docs.spantail.com. Docs have a lifecycle
# separate from product releases: every change to apps/docs/** on main ships immediately,
# independent of `v*` version tags. Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID
# repository secrets (a Cloudflare account dedicated to the project, not any self-hoster's).
# CF_BEACON_TOKEN (optional) enables Cloudflare Web Analytics; without it the site builds
# with no beacon.
name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build and deploy docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_BEACON_TOKEN: ${{ secrets.CF_BEACON_TOKEN }}
        run: pnpm --filter docs run deploy
