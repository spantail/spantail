name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      # Builds the cli bundle via prepack, catching bundling regressions.
      - run: pnpm --filter spantail pack
      # Fixture tests for the Claude Code plugin's jq transcript mappers.
      - name: Plugin hook tests
        run: |
          for t in plugins/claude-code/hooks/*.test.sh; do bash "$t"; done
