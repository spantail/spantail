name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm quality
      - run: pnpm test
      # Builds the cli bundle via prepack, catching bundling regressions.
      - run: pnpm --filter spantail pack
      # Fixture tests for the Claude Code plugin's jq transcript mappers.
      - name: Plugin hook tests
        run: |
          for t in plugins/claude-code/hooks/*.test.sh; do bash "$t"; done

  # Static security analysis (SAST). Semgrep is Python-based, so it runs in its own
  # container rather than through pnpm. Registry TypeScript rules + Spantail-specific
  # rules that machine-check the docs/security.md invariants.
  semgrep:
    runs-on: ubuntu-latest
    container:
      # Pinned for deterministic CI; bump deliberately.
      image: semgrep/semgrep:1.168.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: semgrep scan --config p/typescript --config .semgrep --error

