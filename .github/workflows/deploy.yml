# Config validation for the self-hosting deploy path. Real deployment is a
# self-hosting concern (it runs against someone else's Cloudflare account via
# Workers Builds or `pnpm deploy`), so this workflow never deploys — it only
# builds, dry-runs `wrangler deploy`, and exercises the build-time D1 id
# injection used by `pnpm --filter web run deploy:ci`.
name: Deploy (config validation)

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web run build
      # Match the real deploy command shape (deploy / deploy:ci both pass this).
      - run: pnpm --filter web exec wrangler deploy --dry-run --var APP_ENV:production

      # Exercise inject-deploy-config.mjs against a throwaway copy so the
      # committed wrangler.jsonc is never mutated. Covers all three modes:
      # no-op (unset), placeholder replacement, and drift refusal.
      - name: Validate D1 id injection
        run: |
          set -euo pipefail
          PLACEHOLDER=00000000-0000-0000-0000-000000000000
          ID_A=11111111-1111-1111-1111-111111111111
          ID_B=22222222-2222-2222-2222-222222222222
          TMP="$(mktemp)"
          SCRIPT=apps/web/scripts/inject-deploy-config.mjs

          # 1. Unset -> no-op: placeholder must remain.
          cp apps/web/wrangler.jsonc "$TMP"
          node "$SCRIPT" "$TMP"
          grep -q "$PLACEHOLDER" "$TMP" || { echo "no-op mode altered the file"; exit 1; }

          # 2. Set with placeholder present -> replaced with the real id.
          D1_DATABASE_ID="$ID_A" node "$SCRIPT" "$TMP"
          grep -q "$ID_A" "$TMP" || { echo "replace mode did not inject the id"; exit 1; }
          grep -q "$PLACEHOLDER" "$TMP" && { echo "placeholder still present after replace"; exit 1; }

          # 3. Set to a different id than the one now committed -> drift error.
          if D1_DATABASE_ID="$ID_B" node "$SCRIPT" "$TMP"; then
            echo "drift mode should have failed but exited 0"; exit 1
          fi
          echo "inject-deploy-config: all three modes behaved as expected"
