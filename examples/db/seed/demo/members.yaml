# Northwind is a software consultancy: everyone is a member of the internal
# workspace, and is staffed onto one or more client workspaces. The manager
# (owner/admin) of a workspace is the recipient of its daily/monthly reports.
#
#   Northwind (internal) — owner: Alice; all five are members.
#   Acme Robotics        — lead: Bilal;  staffed: Bilal, Erin, Carol (help).
#   Globex Media         — lead: Carol;  staffed: Carol, Bilal, Erin.
#   Meridian Logistics   — lead: Daichi; staffed: Daichi, Alice (daily liaison).
#
# Bilal and Erin are both shared across the two coastal clients (Acme + Globex),
# so they file a combined cross-workspace daily report (see report-routes.yaml).
# Alice, Bilal and Carol all do daily internal work, so the internal-workspace
# owner (Alice) receives a high volume of daily reports.
- workspace: ws-self
  user: u-admin
  role: owner
- workspace: ws-self
  user: u-author
  role: member
- workspace: ws-self
  user: u-carol
  role: member
- workspace: ws-self
  user: u-dan
  role: member
- workspace: ws-self
  user: u-erin
  role: member

- workspace: ws-acme
  user: u-author
  role: admin
- workspace: ws-acme
  user: u-erin
  role: member
- workspace: ws-acme
  user: u-carol
  role: member

- workspace: ws-globex
  user: u-carol
  role: admin
- workspace: ws-globex
  user: u-author
  role: member
- workspace: ws-globex
  user: u-erin
  role: member

- workspace: ws-meridian
  user: u-dan
  role: admin
- workspace: ws-meridian
  user: u-admin
  role: member

# Frank runs Initech alone; no Northwind member (and not Alice) belongs here.
- workspace: ws-initech
  user: u-frank
  role: owner
