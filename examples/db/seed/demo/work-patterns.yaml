# How each member fills their week. Each line is a project, the *typical* minutes
# spent on it on a day it is worked, and how often it is worked (`cadence`):
#   daily      — every working day (the member's main engagement)
#   often      — most days (a regular secondary engagement)
#   weekly     — about once a week (light internal work)
#   occasional — a few days a month (cross-client help work)
# The generator jitters the minutes per day and takes the occasional day off, so
# totals land around 8h but rise and fall. Everything is derived deterministically
# from the user + date, so reruns are reproducible.
#
# The cadences are also chosen so the demo's busiest views overflow a 50-row page
# (PAGE_SIZE 50) over the ~45-day window: Alice has daily work in two workspaces
# (Home + her own Reports paginate), several projects have two daily contributors
# (Project detail paginates), and Alice/Carol receive a daily report stream
# (Messages paginates).
allocations:
  # Alice runs Northwind internally and is the daily Meridian liaison, so she has
  # daily work in two workspaces (Home and her Reports both overflow a page).
  u-admin:
    - { project: p-self-platform, minutes: 210, cadence: daily }
    - { project: p-self-tooling, minutes: 120, cadence: daily }
    - { project: p-meridian-inventory, minutes: 150, cadence: daily }
  # Bilal is shared across both coastal clients and does daily internal work, so
  # his internal daily report flows to Alice every weekday.
  u-author:
    - { project: p-acme-warehouse, minutes: 180, cadence: daily }
    - { project: p-globex-portal, minutes: 150, cadence: daily }
    - { project: p-self-tooling, minutes: 120, cadence: daily }
  # Carol leads Globex, keeps a daily internal platform line (its report flows to
  # Alice), and helps Acme now and then.
  u-carol:
    - { project: p-globex-analytics, minutes: 210, cadence: daily }
    - { project: p-self-platform, minutes: 120, cadence: daily }
    - { project: p-globex-cms, minutes: 150, cadence: often }
    - { project: p-acme-mobile, minutes: 90, cadence: occasional }
  # Daichi leads Meridian, sharing the inventory line with Alice (so that project
  # has two daily contributors), with light internal work.
  u-dan:
    - { project: p-meridian-orders, minutes: 240, cadence: daily }
    - { project: p-meridian-inventory, minutes: 150, cadence: daily }
    - { project: p-meridian-dashboard, minutes: 90, cadence: often }
    - { project: p-self-tooling, minutes: 90, cadence: weekly }
  # Erin is the other engineer shared across both coastal clients; she shares the
  # Globex portal daily line with Bilal (so that project paginates too).
  u-erin:
    - { project: p-acme-mobile, minutes: 195, cadence: daily }
    - { project: p-globex-portal, minutes: 195, cadence: daily }
    - { project: p-self-devops, minutes: 120, cadence: often }
  # Frank runs Initech solo (its own workspace, no Northwind overlap).
  u-frank:
    - { project: p-initech-crm, minutes: 270, cadence: daily }
    - { project: p-initech-billing, minutes: 180, cadence: daily }

tags:
  en: [feature, review, bugfix, test, refactor, docs]
  ja: [feature, review, bugfix, test, refactor, docs]
