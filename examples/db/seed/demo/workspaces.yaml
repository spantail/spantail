# The instance owner is a fictional software firm (Northwind Software) plus
# three client workspaces. `language` drives the language of seeded content
# (project names, work-entry descriptions) and which report template is used.
# This is the English demo: every workspace is English.
- key: ws-self
  slug: northwind
  name: Northwind Software
  timezone: Asia/Tokyo
  language: en
- key: ws-acme
  slug: acme
  name: Acme Robotics
  timezone: America/Los_Angeles
  language: en
  client: true
- key: ws-globex
  slug: globex
  name: Globex Media
  timezone: America/Los_Angeles
  language: en
  client: true
- key: ws-meridian
  slug: meridian
  name: Meridian Logistics
  timezone: Asia/Tokyo
  language: en
  client: true
# A workspace nobody on the core team belongs to. Alice runs the instance but is
# not a member here, so it only shows up for her via the instance-admin bypass —
# handy for demoing that an admin can reach a workspace they are not part of.
- key: ws-initech
  slug: initech
  name: Initech
  timezone: America/New_York
  language: en
