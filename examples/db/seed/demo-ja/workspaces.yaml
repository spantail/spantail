# The instance owner is a fictional software firm (あづみ野ソフトウェア) plus
# three client workspaces. `language` drives the language of seeded content
# (project names, work-entry descriptions) and which report template is used.
# This is the Japanese demo: every workspace is Japanese (Asia/Tokyo).
- key: ws-self
  slug: azumino
  name: あづみ野ソフトウェア
  timezone: Asia/Tokyo
  language: ja
- key: ws-acme
  slug: sakura
  name: 桜トレーディング
  timezone: Asia/Tokyo
  language: ja
  client: true
- key: ws-globex
  slug: fuji
  name: 富士メディア
  timezone: Asia/Tokyo
  language: ja
  client: true
- key: ws-meridian
  slug: tsubaki
  name: 椿物流
  timezone: Asia/Tokyo
  language: ja
  client: true
# A workspace nobody on the core team belongs to. Hanako runs the instance but
# is not a member here, so it only shows up for her via the instance-admin
# bypass — handy for demoing that an admin can reach a workspace they are not
# part of.
- key: ws-initech
  slug: kanda
  name: 神田システムズ
  timezone: Asia/Tokyo
  language: ja
