# クロスワークスペースの日報。複数のワークスペースをまたいで働くメンバーは、
# それらをまとめた1通の日報を提出する (該当ワークスペースの個別日報の代わり)。
# レンダリングされた文書はそれらのワークスペースのエントリを混在させるため、
# *すべての*対象ワークスペースに所属する人にだけ配信できる。受信者はメンバー
# シップから導出され (アプリの「送信先」ピッカーと同じ規則)、決して広がらない
# ので、受信者が所属しないワークスペースを見ることはない。
#
# 一郎と由美は2つのクライアント(桜 + 富士)を兼務するので、各自が桜 + 富士の1日を
# 1通にまとめる。メンバーシップ上、両ワークスペースの他メンバーに届く:
#   - 一郎の 桜 + 富士 → 美咲, 由美
#   - 由美の 桜 + 富士 → 一郎, 美咲
# 先頭のワークスペースがアンカー (そのタイムゾーンと言語が日報を規定する)。
- sender: u-author
  workspaces: [ws-acme, ws-globex]
- sender: u-erin
  workspaces: [ws-acme, ws-globex]
