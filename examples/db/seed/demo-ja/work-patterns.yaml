# 各メンバーが1週間をどう埋めるか。各行はプロジェクト・その日に充てる*典型的な*
# 分数・どのくらいの頻度で作業するか (`cadence`):
#   daily      — 毎営業日 (そのメンバーの主担当)
#   often      — ほとんどの日 (定常的な副担当)
#   weekly     — 週1回程度 (軽い社内作業)
#   occasional — 月数日 (他クライアントのヘルプ)
# 生成器は日ごとに分数をジッターさせ、時々休みも入れるので、合計は約8時間前後で
# 上下する。すべてユーザー + 日付から決定的に導出され、再実行で再現する。
#
# cadence は、デモの繁忙ビューが1ページ(PAGE_SIZE 50)を超えるようにも選んでいる:
# 花子は2つのワークスペースで日次作業を持ち (Home と本人の Reports がページング)、
# いくつかのプロジェクトは日次の担当者が2人いて (Project 詳細がページング)、
# 花子・美咲には日報が大量に届く (Messages がページング)。
allocations:
  # 花子はあづみ野を社内運営しつつ椿物流の日次リエゾン。2つのワークスペースで
  # 日次作業を持つ (Home と本人の Reports が1ページを超える)。
  u-admin:
    - { project: p-self-platform, minutes: 210, cadence: daily }
    - { project: p-self-tooling, minutes: 120, cadence: daily }
    - { project: p-meridian-inventory, minutes: 150, cadence: daily }
  # 一郎は2つのクライアントを兼務しつつ社内の日次作業を持つので、社内日報が毎営業日
  # 花子に届く。
  u-author:
    - { project: p-acme-warehouse, minutes: 180, cadence: daily }
    - { project: p-globex-portal, minutes: 150, cadence: daily }
    - { project: p-self-tooling, minutes: 120, cadence: daily }
  # 美咲は富士をリードし、社内のプラットフォーム作業を日次で持ち (その日報が花子に
  # 届く)、桜を時々ヘルプする。
  u-carol:
    - { project: p-globex-analytics, minutes: 210, cadence: daily }
    - { project: p-self-platform, minutes: 120, cadence: daily }
    - { project: p-globex-cms, minutes: 150, cadence: often }
    - { project: p-acme-mobile, minutes: 90, cadence: occasional }
  # 健は椿物流をリードし、在庫ラインを花子と共有する (このプロジェクトは日次担当が
  # 2人)。社内作業は軽め。
  u-dan:
    - { project: p-meridian-orders, minutes: 240, cadence: daily }
    - { project: p-meridian-inventory, minutes: 150, cadence: daily }
    - { project: p-meridian-dashboard, minutes: 90, cadence: often }
    - { project: p-self-tooling, minutes: 90, cadence: weekly }
  # 由美はもう一人の兼務エンジニア。富士のポータルの日次ラインを一郎と共有する
  # (このプロジェクトもページングする)。
  u-erin:
    - { project: p-acme-mobile, minutes: 195, cadence: daily }
    - { project: p-globex-portal, minutes: 195, cadence: daily }
    - { project: p-self-devops, minutes: 120, cadence: often }
  # 大輔は神田システムズを1人で運営 (独立したワークスペース、あづみ野と重複なし)。
  u-frank:
    - { project: p-initech-crm, minutes: 270, cadence: daily }
    - { project: p-initech-billing, minutes: 180, cadence: daily }

tags:
  en: [feature, review, bugfix, test, refactor, docs]
  ja: [feature, review, bugfix, test, refactor, docs]
